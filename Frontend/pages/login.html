<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="../styles/login.css" />
</head>

  <body>
    <div class="auth-container">
      <div class="headings">
        <h3>Login</h3>
        <p>Welcome back! Please login to continue.</p>
      </div>

      <div class="role-toggle">
        <button
          id="donorBtn"
          class="toggle-btn active"
          onclick="switchRole('donor')"
        >
          Donor
        </button>
        <button id="trustBtn" class="toggle-btn" onclick="switchRole('trust')">
          Trust
        </button>
        <button id="adminBtn" class="toggle-btn" onclick="switchRole('admin')">
          Admin
        </button>
      </div>

      <div id="messageBox" class="form-message"></div>

      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="box-1">
          <label class="label-1">Email</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
            autocomplete="email"
          />
        </div>

        <div class="box-2">
          <label class="label-2">Password</label>
          <div class="password-box">
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
              autocomplete="one-time-code"
            />
            <img
              src="../assets/eye-off.png"
              class="eye-icon"
              onclick="togglePassword('password')"
              alt="toggle password"
            />
          </div>
        </div>

        <div class="btn-section">
          <button type="submit">Login</button>
        </div>
      </form>

      <script type="module" src="../scripts/login.js"></script>

      <p class="auth-link">
        Don’t have an account?
        <a href="../pages/signup.html">Signup</a>
      </p>
    </div>
  </body>
</html>
