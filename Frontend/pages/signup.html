<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>signup</title>
  <link rel="stylesheet" href="../styles/signup.css" />
</head>

<body>
  <div class="form-container">
    <div class="top-headings">
      <h3>Create Account</h3>
      <p>Join Bridge of Hope and make a difference</p>
    </div>

    <div class="role-toggle">
      <button id="donorBtn" class="toggle-btn active" onclick="switchRole('donor')">Donor</button>
      <button id="trustBtn" class="toggle-btn" onclick="switchRole('trust')">Trust</button>
    </div>

    <div id="messageBox" class="form-message"></div>

    <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)" autocomplete="off">
      <!-- DONOR FIELDS -->
      <div id="donorFields" class="form-grid">
        <div>
          <label>First Name</label>
          <input type="text" id="firstName" placeholder="Enter first name" />
        </div>

        <div>
          <label>Last Name</label>
          <input type="text" id="lastName" placeholder="Enter last name" />
        </div>

        <div>
          <label>Profile Photo</label>
          <input type="file" id="donorPhoto" accept="image/*" />
          <p id="uploadStatus" class="upload-status">Processing photo... please wait</p>
        </div>
      </div>

      <!-- TRUST FIELDS -->
      <div id="trustFields" class="form-grid" style="display: none;">
        <div>
          <label>Trust Name</label>
          <input type="text" id="trustName" placeholder="Enter trust name" />
        </div>

        <div>
          <label>Trust Address</label>
          <input type="text" id="trustAddress" placeholder="Enter trust address" />
        </div>

        <div>
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter username" />
        </div>

        <div>
          <label>License Number</label>
          <input type="text" id="licenseNumber" placeholder="Enter license number" />
        </div>

        <div>
          <label>Trust Image</label>
          <input type="file" id="trustPhoto" accept="image/*" />
        </div>
      </div>

      <!-- COMMON FIELDS -->
      <div class="form-grid">

        <div>
          <label>Email</label>
          <input type="email" id="email" placeholder="Enter email" required />
        </div>

        <div>
          <label>Create Password</label>
          <div class="password-box">
            <input type="password" id="password" placeholder="Enter password" required autocomplete="one-time-code" />
            <img src="../assets/eye-off.png" class="eye-icon" onclick="togglePassword('password')"
              alt="toggle password">
          </div>
        </div>

        <div>
          <label>Confirm Password</label>
          <div class="password-box">
            <input type="password" id="confirmPassword" placeholder="Confirm password" required
              autocomplete="one-time-code" />
            <img src="../assets/eye-off.png" class="eye-icon" onclick="togglePassword('confirmPassword')"
              alt="toggle password">
          </div>
        </div>

        <div>
          <label>Mobile Number</label>
          <input type="tel" id="mobile" placeholder="Enter Mobile Number" required />
        </div>

        <div>
          <label>City</label>
          <input type="text" id="city" placeholder="Enter city" required />
        </div>

        <div>
          <label>Pincode</label>
          <input type="text" id="pincode" placeholder="Enter Pincode" required />
        </div>
      </div>

      <div class="buttons">
        <button type="submit">Signup</button>
      </div>

      <p class="auth-links">
        Already have an account?
        <a href="../pages/login.html">Login</a>
      </p>
    </form>
  </div>

  <script type="module" src="../scripts/signup.js"></script>
</body>

</html>
